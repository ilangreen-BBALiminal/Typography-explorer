<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: #2a2a2a;
    --border-hover: #444;
    --text-primary: #f0ede8;
    --text-secondary: #888;
    --text-muted: #555;
    --accent: #c8a96e;
    --accent-dim: rgba(200, 169, 110, 0.12);
    --pill-bg: #222;
    --pill-active: #c8a96e;
    --pill-active-text: #0f0f0f;
    --tag-bg: rgba(255,255,255,0.06);
    --tag-text: #777;
    --radius: 4px;
    --card-radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 48px 40px 0;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 4vw, 4rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 13px;
    max-width: 520px;
    line-height: 1.6;
  }

  /* ── Controls ── */
  .controls {
    padding: 28px 40px 0;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
    white-space: nowrap;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--pill-bg);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family: inherit;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--pill-active-text);
    font-weight: 600;
  }

  .search-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    width: 260px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .results-count {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Toggle: text sample ── */
  .sample-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .sample-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .sample-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .sample-btn.active { background: var(--surface2); border-color: var(--border-hover); color: var(--text-primary); }

  /* ── Grid ── */
  .grid {
    padding: 28px 40px 80px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s ease;
    cursor: default;

  .card:hover { border-color: var(--border-hover); }
  .card.hidden { display: none; }

    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 200px;
    position: relative;

    color: var(--text-primary);

  .card-body-text {

    letter-spacing: 0.06em;
    margin-top: auto;
    padding-top: 8px;

    align-items: center;
    justify-content: space-between;
    gap: 8px;

    color: var(--text-secondary);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;

  .font-name-body {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;

  .font-link {
    color: var(--text-secondary);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }
  .font-link:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .font-link svg {
    opacity: 0.5;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .font-link:hover svg { opacity: 1; }
  .font-pair-sep {
    color: var(--text-muted);
    font-weight: 300;
    font-size: 13px;
    line-height: 1;

  .card-tags {
    display: flex;

    flex-wrap: wrap;
    justify-content: flex-end;

  .tag {

    font-weight: 600;

    background: var(--tag-bg);
    color: var(--tag-text);

    border-radius: 100px;

  .tag.adobe { color: #e8734a; background: rgba(232,115,74,0.1); }

  /* Copy button */
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #6a9955; color: #6a9955; }

  /* ── No results ── */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Section dividers ── */
  .section-header {
    grid-column: 1 / -1;
    padding: 20px 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .section-header h2 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);

  /* Scrollbar */

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

  @media (max-width: 600px) {
    .header, .controls, .grid { padding-left: 20px; padding-right: 20px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

    gfonts: [] },

  { id: 'af3', category: 'african', tags: ['free'],
    headingFont: 'Plus Jakarta Sans', headingWeight: 700, headingSize: 2.1,
    bodyFont: 'Source Sans 3', bodyWeight: 400, bodySize: 0.9,
    char: 'Contemporary African brand',
    gfonts: [] },

  { id: 'af4', category: 'african', tags: ['free'],
    headingFont: 'Onest', headingWeight: 700, headingSize: 2.1,
    bodyFont: 'Albert Sans', bodyWeight: 400, bodySize: 0.9,
    char: 'Modern Pan-African feel',
    gfonts: [] },

  // ── Display Singles ────────────────────────────────────────
  { id: 'mn1', category: 'mono', tags: ['free'],
    headingFont: 'Cormorant Garamond', headingWeight: 400, headingSize: 3.0,
    bodyFont: null, bodyWeight: 300, bodySize: 0.85,
    char: 'Display — elegant serif',
    gfonts: [] },

  { id: 'mn2', category: 'mono', tags: ['free'],
    headingFont: 'Fraunces', headingWeight: 700, headingSize: 2.8,
    bodyFont: null, bodyWeight: 400, bodySize: 0.9,
    char: 'Display — expressive optical',
    gfonts: [] },

  { id: 'mn3', category: 'mono', tags: ['free'],
    headingFont: 'Syne', headingWeight: 800, headingSize: 2.5,
    bodyFont: null, bodyWeight: 400, bodySize: 0.9,
    char: 'Display — expressive grotesque',
    gfonts: [] },

  { id: 'mn4', category: 'mono', tags: ['free'],
    headingFont: 'IBM Plex Sans', headingWeight: 700, headingSize: 2.2,
    bodyFont: 'JetBrains Mono', bodyWeight: 400, bodySize: 0.85,
    char: 'Technical / developer',
    gfonts: [] },
];

// ── Render ────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const resultsCount = document.getElementById('resultsCount');

let activeFilter = 'all';
let searchQuery = '';

function getSample() { return SAMPLES[currentSample]; }

function cssLine(p) {
  const h = p.headingFont;
  const b = p.bodyFont || p.headingFont;
  return `font-family: '${h}', serif;\n/* Body: '${b}' */`;
}

function importLine(p) {
  const fonts = new Set([p.headingFont, p.bodyFont].filter(Boolean));
  const names = [...fonts].map(f => f.replace(/ /g,'+')).join('&family=');
  return `@import url('https://fonts.googleapis.com/css2?family=${names}&display=swap');`;
}

function buildCard(p) {
  const s = getSample();
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = p.id;
  card.dataset.category = p.category;
  card.dataset.fonts = [p.headingFont, p.bodyFont].filter(Boolean).join(' ').toLowerCase();

  const bodyStyle = p.bodyFont
    ? `font-family: '${p.bodyFont}', sans-serif; font-weight: ${p.bodyWeight}; font-size: ${p.bodySize}rem;`
    : `font-family: '${p.headingFont}', serif; font-weight: ${p.bodyWeight}; font-size: ${p.bodySize}rem;`;

  const tagHtml = p.tags.map(t => `<span class="tag ${t}">${t === 'free' ? 'Google Fonts' : 'Adobe'}</span>`).join('');

  const extIcon = `<svg width="9" height="9" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 9L9 1M9 1H3.5M9 1V6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function fontLink(name) {
    const slug = name.replace(/ /g, '+');
    const url = `https://fonts.google.com/specimen/${slug}`;
    return `<a class="font-link" href="${url}" target="_blank" rel="noopener" title="Open ${name} on Google Fonts">${name}${extIcon}</a>`;
  }

  const headingLink = fontLink(p.headingFont);
  const bodyLink = (p.bodyFont && p.bodyFont !== p.headingFont) ? fontLink(p.bodyFont) : '';
  const nameLine = bodyLink
    ? `${headingLink}<span class="font-pair-sep">×</span>${bodyLink}`
    : headingLink;

  card.innerHTML = `
    <div class="card-preview">
      <div class="card-heading" style="font-family: '${p.headingFont}', serif; font-weight: ${p.headingWeight}; font-size: ${p.headingSize}rem; line-height: 1.08; letter-spacing: -0.02em;">
        ${s.heading}
      </div>
      <div class="card-body-text" style="${bodyStyle}">
        ${s.body}
      </div>
      <div class="card-meta-text">${s.meta}</div>
    </div>
    <div class="card-footer">
      <div class="pairing-names">
        <div class="font-name-heading">${nameLine}</div>
        <div class="font-name-body">${p.char}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        ${tagHtml}
        <button class="copy-btn" data-id="${p.id}">Copy CSS</button>
      </div>
    </div>
  `;

  return card;
}

function render() {
  grid.innerHTML = '';
  const s = searchQuery.toLowerCase();
  let visible = 0;

  PAIRINGS.forEach(p => {
    const catMatch = activeFilter === 'all' || p.category === activeFilter;
    const searchMatch = !s || p.fonts?.includes(s) ||
      p.headingFont.toLowerCase().includes(s) ||
      (p.bodyFont || '').toLowerCase().includes(s) ||
      p.char.toLowerCase().includes(s) ||
      p.category.toLowerCase().includes(s);

    if (catMatch && searchMatch) {
      grid.appendChild(buildCard(p));
      visible++;
    }
  });

  if (visible === 0) {
    const msg = document.createElement('div');
    msg.className = 'no-results';
    msg.textContent = 'No pairings match — try a different filter or search term.';
    grid.appendChild(msg);
  }

  resultsCount.textContent = visible === PAIRINGS.length
    ? `${visible} pairings`
    : `${visible} of ${PAIRINGS.length} pairings`;
}

// ── Event listeners ───────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('.sample-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSample = btn.dataset.sample;
    render();
  });
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  render();
});

grid.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const id = btn.dataset.id;
  const p = PAIRINGS.find(x => x.id === id);
  if (!p) return;
  const css = `${importLine(p)}\n\nh1, h2, h3 {\n  font-family: '${p.headingFont}', serif;\n  font-weight: ${p.headingWeight};\n}\n\nbody, p {\n  font-family: '${p.bodyFont || p.headingFont}', sans-serif;\n  font-weight: ${p.bodyWeight};\n}`;
  navigator.clipboard.writeText(css).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy CSS'; btn.classList.remove('copied'); }, 1500);
  });
});

// ── Init ──────────────────────────────────────────────────────────────
render();
</script>
</body>
